<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUBI: Space Adventure</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        
        <header class="game-header">
            <div class="user-info">
                <span id="player-name">Загрузка...</span>
            </div>
            
            <div class="wallet">
                <div class="currency quant">
                    <div class="coin-tag">
                        <img src="assets/quant-icon.png" alt="Q">
                        <span>QUANT</span>
                    </div>
                    <span id="quant-val">0</span>
                </div>
                
                <div class="currency qubi">
                    <div class="coin-tag">
                        <img src="assets/qubi-icon.png" alt="B">
                        <span>QUBI</span>
                    </div>
                    <b id="qubi-val">0</b>
                </div>
            </div>
        </header>

        <div id="moon-modal" class="modal-overlay" style="display: none;">
            <div class="moon-card">
                <button class="close-btn" id="close-moon">×</button>
                <div class="moon-header">
                    <img src="assets/moon.png" alt="Moon">
                    <h2>LUNAR REFINERY</h2>
                </div>
                <div class="refinery-body">
                    <p>Переработка ресурсов QUANT в чистую ЭНЕРГИЮ</p>
                    <div class="res-info">
                        <span>Доступно QUANT:</span>
                        <span id="res-amount">0</span>
                    </div>
                    <button id="process-btn">НАЧАТЬ ПЕРЕРАБОТКУ</button>
                </div>
            </div>
        </div>

        <div id="leaderboard-modal" class="modal-overlay" style="display: none;">
            <div class="moon-card leaderboard-card">
                <button class="close-btn" id="close-leaderboard">×</button>
                <div class="moon-header">
                    <img src="assets/neptun.png" alt="Neptune">
                    <h2>TOP 100 PILOTS</h2>
                </div>
                <div class="leaderboard-list" id="leaderboard-container">
                    <div class="player-row loading-text">Загрузка данных из космоса...</div>
                </div>
            </div>
        </div>
        
        <div class="energy-section">
            <div class="energy-bar">
                <div id="energy-fill"></div>
            </div>
            <div class="energy-label">ENERGY</div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <p>Инициализация систем QUBI...</p>
        </div>

    </div> <script src="game.js"></script>
</body>
</html>
