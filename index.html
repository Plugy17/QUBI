<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUBI: Space Adventure</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Задний план -->
    <canvas id="gameCanvas"></canvas>

    <!-- Слой интерфейса -->
    <div id="ui-layer">
        <header class="game-header">
            <div class="user-info">
                <span id="player-name">Загрузка...</span>
            </div>
            
            <div class="wallet">
    <div class="currency">
        <div class="coin-tag">
            <img src="assets/quant-icon.png" alt="Q">
            <span>QUANT</span>
        </div>
        <span id="quant-val">0</span>
    </div>
    <div class="currency">
        <div class="coin-tag">
            <img src="assets/qubi-icon.png" alt="B">
            <span>QUBI</span>
        </div>
        <b id="qubi-val">0</b>
    </div>
</div>
        </header>

        <div class="energy-section">
            <div class="energy-bar">
                <div id="energy-fill"></div>
            </div>
            <div class="energy-label">ENERGY</div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <p>Инициализация систем QUBI...</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
